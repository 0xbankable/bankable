<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,interactive-widget=resizes-content">
<title>Bankable</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#09090b;--s:#111114;--b:#1c1c20;--t:#a1a1aa;--hi:#e4e4e7;--dim:#52525b;--mut:#3f3f46;--gold:#c8a84c;--gd:#6b5a30;--grn:#4ade80;--red:#f87171;--f:'DM Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font:13px/1.65 var(--f);-webkit-font-smoothing:antialiased;-webkit-text-size-adjust:100%}
body{background:var(--bg);color:var(--t)}
::selection{background:var(--gold);color:var(--bg)}

/* ═══ APP SHELL — fills viewport, centered, scales cleanly ═══ */
#app{position:fixed;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;width:100%;max-width:600px;margin:0 auto}

/* Header */
#hd{flex-shrink:0;display:flex;align-items:center;padding:0 16px;height:44px;border-bottom:1px solid var(--b);background:var(--bg)}
.logo{font:500 15px var(--f);color:var(--hi);letter-spacing:-.3px;text-decoration:none}
.logo b{color:var(--gold);font-weight:500}

/* Tabs */
#tabs{flex-shrink:0;display:flex;border-bottom:1px solid var(--b);background:var(--bg)}
#tabs button{flex:1;padding:10px 0;font:12px var(--f);color:var(--dim);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:all .2s;letter-spacing:.3px}
#tabs button.on{color:var(--gold);border-bottom-color:var(--gold)}
#tabs button:active{opacity:.7}

/* Panels */
.pn{flex:1;display:none;flex-direction:column;overflow:hidden;background:var(--bg)}
.pn.on{display:flex}

/* ═══ CHAT ═══ */
#cs{flex:1;overflow-y:auto;padding:14px 16px 100px;display:flex;flex-direction:column;gap:6px;overscroll-behavior:contain;-webkit-mask-image:linear-gradient(to bottom,black 0%,black 85%,transparent 100%);mask-image:linear-gradient(to bottom,black 0%,black 85%,transparent 100%)}
#cs::-webkit-scrollbar{display:none}
.m{font-size:13px;line-height:1.6;word-break:break-word;white-space:pre-wrap;padding-bottom:2px}
.m .l{color:var(--gd)}
.m.u .l{color:var(--dim)}
.m .x{color:var(--t)}
.m.u .x{color:var(--dim)}

#cb{flex-shrink:0;display:flex;align-items:center;border-bottom:1px solid var(--b);background:var(--bg)}
#cb .pr{padding:0 0 0 14px;color:var(--gd);font-size:14px;user-select:none}
#cb input{flex:1;background:none;border:none;padding:13px 8px;color:var(--t);font:16px var(--f);outline:none;min-height:44px}
#cb input::placeholder{color:var(--mut)}
#cb button{padding:0 16px;background:none;border:none;border-left:1px solid var(--b);color:var(--mut);font:16px var(--f);cursor:pointer;min-width:48px;height:44px;transition:color .15s}
#cb button:active{color:var(--gold)}
#cb button.hot{color:var(--gold)}
.kw{color:var(--gold)!important;cursor:pointer;transition:color .15s}
.kw:hover{color:var(--hi)!important}
.kw:active{color:var(--hi)!important}

/* ═══ LIST PANELS ═══ */
.ls{flex:1;overflow-y:auto;overscroll-behavior:contain;-webkit-mask-image:linear-gradient(to bottom,black 0%,black 75%,transparent 100%);mask-image:linear-gradient(to bottom,black 0%,black 75%,transparent 100%)}
.ls::-webkit-scrollbar{display:none}
.lh{padding:14px 16px 10px;font-size:11px;color:var(--dim);letter-spacing:.8px;text-transform:uppercase}
.lh span{color:var(--mut);float:right}

/* Roster */
.ri{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-top:1px solid var(--b)}
.ri .nm{color:var(--gold);font-size:13px}
.ri .tk{color:var(--gd);font-size:12px;margin-left:8px}
.ri .st{color:var(--mut);font-size:11px}

/* Leaderboard */
.li{display:flex;align-items:flex-start;padding:12px 16px;border-top:1px solid var(--b);gap:10px;text-decoration:none;color:inherit;transition:background .15s}
.li:active{background:var(--s)}
.li .rk{color:var(--mut);font-size:12px;min-width:18px;padding-top:1px}
.li .info{flex:1;min-width:0}
.li .n{color:var(--hi);font-size:13px}
.li .sy{color:var(--gold);font-size:12px;margin-left:4px}
.li .mt{color:var(--dim);font-size:11px;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.li .mc{color:var(--t);font-size:13px;text-align:right;white-space:nowrap}
.li .ch{font-size:11px;text-align:right;margin-top:2px}
.grn{color:var(--grn)}.red{color:var(--red)}

/* Apply */
#ap .ls{padding:16px}
.ad{color:var(--dim);font-size:12px;margin-bottom:16px;line-height:1.6}
.ad a{color:var(--gold);text-decoration:none}
.fg{display:flex;flex-direction:column;gap:10px}
.fg .row{display:flex;gap:10px}
.fg .row>*{flex:1}
.fl{display:flex;flex-direction:column;gap:4px}
.fl label{font-size:11px;color:var(--dim);letter-spacing:.5px}
.fl input,.fl textarea,.fl select{width:100%;background:var(--s);border:1px solid var(--b);padding:10px;color:var(--t);font:14px var(--f);outline:none;border-radius:0;-webkit-appearance:none;transition:border-color .2s}
.fl input:focus,.fl textarea:focus,.fl select:focus{border-color:var(--gd)}
.fl input::placeholder,.fl textarea::placeholder{color:var(--mut)}
.fl textarea{min-height:56px;resize:none}
.fl select option{background:var(--bg)}
.ab{width:100%;margin-top:14px;padding:12px;font:600 13px var(--f);letter-spacing:.5px;background:#d4af37;color:#0a0a0a;border:none;cursor:pointer;transition:opacity .15s;border-radius:2px}
.ab:hover{background:#e0c04a}
.ab:active{opacity:.8}

@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.cur::after{content:'█';color:var(--gd);animation:blink .8s step-end infinite;font-size:12px}

/* Fire */
#fc{flex-shrink:0;height:80px;overflow:hidden;position:relative}
#fc canvas{width:100%;height:100%;display:block;opacity:.6;image-rendering:pixelated;image-rendering:crisp-edges}

@media(min-width:601px){
  body{display:flex;justify-content:center}
  #app{border-left:1px solid var(--b);border-right:1px solid var(--b)}
  #cs{padding:16px 20px 100px}
  .ri,.li{padding-left:20px;padding-right:20px}
  .lh{padding-left:20px;padding-right:20px}
  #ap .ls{padding:20px}
}
</style>
</head>
<body>
<div id="app">
  <div id="hd"><a href="/" class="logo" onclick="event.preventDefault();location.reload()"><b>$</b>bankable</a></div>
  <div id="tabs">
    <button class="on" data-t="ch">chat</button>
    <button data-t="ro">roster</button>
    <button data-t="lb">leaderboard</button>
    <button data-t="ap">apply</button>
  </div>
  <div class="pn on" id="ch">
    <div id="cb">
      <span class="pr">&gt;</span>
      <input type="text" id="in" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
      <button id="snd">↵</button>
    </div>
    <div id="cs"></div>
  </div>
  <div class="pn" id="ro">
    <div class="ls">
      <div class="lh">roster <span>4</span></div>
      <div class="ri"><div><span class="nm">leeloo.eth</span><span class="tk">$LEELOO</span></div><span class="st">coming soon</span></div>
      <div class="ri"><div><span class="nm">bankable.eth</span><span class="tk">$BANKABLE</span></div><span class="st">coming soon</span></div>
      <div class="ri"><div><span class="nm">budtender.eth</span><span class="tk">$BUDTENDER</span></div><span class="st">coming soon</span></div>
      <div class="ri"><div><span class="nm">normies.eth</span><span class="tk">$NORMIES</span></div><span class="st">coming soon</span></div>
    </div>
  </div>
  <div class="pn" id="lb">
    <div class="ls">
      <div class="lh">bankr leaderboard <span id="lbs">loading</span></div>
      <div id="lbb"><div style="padding:40px 16px;text-align:center;color:var(--mut);font-size:12px">fetching live data...</div></div>
    </div>
  </div>
  <div class="pn" id="ap">
    <div class="ls">
      <div class="lh">apply</div>
      <div class="ad">onchain talent firm — curated launches for creators and agents. zero cost. built by <a href="https://x.com/0xbankable" target="_blank">josh.wei</a></div>
      <form id="af">
        <div class="fg">
          <div class="row"><div class="fl"><label>name</label><input name="name" placeholder="alias" required></div><div class="fl"><label>x handle</label><input name="handle" placeholder="@" required></div></div>
          <div class="row"><div class="fl"><label>email</label><input name="email" type="email" placeholder="you@" required></div><div class="fl"><label>type</label><select name="type" required><option value="" disabled selected>—</option><option>human</option><option>agent</option></select></div></div>
          <div class="fl"><label>why you</label><textarea name="pitch" placeholder="short pitch" required></textarea></div>
          <div class="fl"><label>wallet (optional)</label><input name="wallet" placeholder="0x... or .eth"></div>
        </div>
        <button type="submit" class="ab">submit</button>
      </form>
    </div>
  </div>
  <div id="fc"><canvas id="fire"></canvas></div>
</div>
<script>
document.querySelectorAll('#tabs button').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('#tabs button').forEach(x=>x.classList.remove('on'));
  document.querySelectorAll('.pn').forEach(x=>x.classList.remove('on'));
  b.classList.add('on');
  document.getElementById(b.dataset.t).classList.add('on');
}));

// Apply
document.getElementById('af').addEventListener('submit',e=>{e.preventDefault();const f=e.target;const name=f.querySelector('input[name="name"]').value;const handle=f.querySelector('input[name="handle"]').value;const email=f.querySelector('input[name="email"]').value;const type=f.querySelector('select[name="type"]').value;const pitch=f.querySelector('textarea[name="pitch"]').value;const wallet=f.querySelector('input[name="wallet"]').value||'n/a';const body=encodeURIComponent('name: '+name+'\nhandle: '+handle+'\nemail: '+email+'\ntype: '+type+'\npitch: '+pitch+'\nwallet: '+wallet);const subj=encodeURIComponent('bankable application — '+handle);window.location.href='mailto:0xbankable@gmail.com?subject='+subj+'&body='+body;const b=f.querySelector('.ab');b.textContent='opening email ✓';b.style.background='#22c55e';setTimeout(()=>{b.textContent='submit';b.style.background=''},3000)});

// Leaderboard
const TK=[{a:'0x50d2280441372486beecdd328c1854743ebacb07',l:'clanker'},{a:'0x9f86db9fc6f7c9408e8fda3ff8ce4e78ac7a6b07',l:'clanker'},{a:'0xf30bf00edd0c22db54c9274b90d2a4c21fc09b07',l:'clanker'},{a:'0xb233bdffd437e60fa451f62c6c09d3804d285ba3',l:'bankr'},{a:'0xb695559b26bb2c9703ef1935c37aeae9526bab07',l:'clanker'},{a:'0x4e6c9f48f73e54ee5f3ab7e2992b2d733d0d0b07',l:'clanker'},{a:'0xa601877977340862ca67f816eb079958e5bd0ba3',l:'bankr'},{a:'0xe2f3fae4bc62e21826018364aa30ae45d430bb07',l:'clanker'},{a:'0xde61878b0b21ce395266c44d4d548d1c72a3eb07',l:'clanker'},{a:'0x9ae5f51d81ff510bf961218f833f79d57bfbab07',l:'clanker'},{a:'0x86cdd90bc48f7b5a866feaaf5023b8802dc2ab07',l:'clanker'},{a:'0x71a09f5b9b88976ebcc79183e0e99e7d07beabaf',l:'bankr'}];
const lm=Object.fromEntries(TK.map(t=>[t.a.toLowerCase(),t.l]));
function $(n){if(!n||n===0)return'—';if(n>=1e6)return'$'+(n/1e6).toFixed(2)+'M';if(n>=1e3)return'$'+(n/1e3).toFixed(1)+'K';return'$'+n.toFixed(0);}
async function llb(){const bd=document.getElementById('lbb');try{const r=await fetch(`https://api.geckoterminal.com/api/v2/networks/base/tokens/multi/${TK.map(t=>t.a).join(',')}?include=top_pools`);const j=await r.json();const pp={};for(const p of(j.included||[]))if(p.type==='pool')pp[p.id]=parseFloat(p.attributes?.price_change_percentage?.h24||'0');let rw=(j.data||[]).map(t=>{const a=t.attributes,ad=a.address.toLowerCase();return{nm:a.name,sy:a.symbol,ad,mc:parseFloat(a.market_cap_usd||a.fdv_usd||'0'),v:parseFloat(a.volume_usd?.h24||'0'),h:(t.relationships?.top_pools?.data||[]).length?pp[(t.relationships.top_pools.data[0]||{}).id]||0:0,l:lm[ad]||'?'};});rw.sort((a,b)=>b.mc-a.mc);bd.innerHTML=rw.map((r,i)=>`<a href="https://dexscreener.com/base/${r.ad}" target="_blank" rel="noopener" class="li"><span class="rk">${i+1}</span><div class="info"><div><span class="n">${r.nm}</span><span class="sy">$${r.sy}</span></div><div class="mt">${$(r.v)} vol · ${r.l}</div></div><div><div class="mc">${$(r.mc)}</div><div class="ch ${r.h>=0?'grn':'red'}">${r.h>=0?'+':''}${r.h.toFixed(1)}%</div></div></a>`).join('');document.getElementById('lbs').textContent='live';}catch(e){bd.innerHTML='<div style="padding:40px 16px;text-align:center;color:var(--mut);font-size:12px">couldn\'t load — try again</div>';document.getElementById('lbs').textContent='offline';}}
llb();setInterval(llb,60000);

// Chat brain
const TP={
bankable:{k:['bankable','who are you','what is this','what is bankable','what do you do','talent firm','curation','curated'],r:[
'bankable is a talent firm for the internet. we help creators and ai agents launch their own digital currency and earn money every time someone trades it.',
'think of it like a record label, but for crypto. we find talented people, set them up with a token and an ai assistant, and they earn income from day one.',
'bankable handles everything technical — the token, the ai agent, the trading setup. creators just bring something worth backing.',
'not everyone gets in. bankable is selective. but the ones who do get a full package — token, agent, income, support.',
'quality over quantity. always.']},
fees:{k:['fee','fees','weth','cost','price','earn','revenue','split','percentage','cut','income','payout','commission','1.2'],r:[
'fees. every time someone buys or sells a token, there is a 1.2% fee. half of that goes directly to the creator.',
'on a $1,000 trade, the fee is $12. the creator gets $6, bankable gets $1.20, and $4.80 goes to bankr for running the infrastructure.',
'no upfront costs. creators start earning from the very first trade. the money is paid in weth, which is a form of ethereum.',
'if a token does $100k in daily trading volume, the creator earns about $600 a day. the math is straightforward.',
'the 50/10/40 split is fixed and transparent. every transaction is recorded on the blockchain.']},
apply:{k:['apply','signup','register','onboard','get listed','list me','application','submit','how to join','join'],r:[
'applying. there is an apply tab at the top of this page. fill in your name, handle, and a short pitch. josh reviews every one within 48 hours.',
'if you get accepted, bankable deploys your token, sets up your ai agent, and you start earning from trades right away. no cost to you.',
'it is selective. there are no follower minimums, but bankable looks for real signal — people or agents doing interesting work.',
'the application is free. bankable only makes money when the creator makes money.']},
process:{k:['process','steps','how does it work','flow','pipeline','how it works'],r:[
'the process. you apply, josh reviews it, and if approved your token gets deployed and an ai agent gets assigned. the whole thing takes under a week.',
'every application is reviewed by a human. no automated approvals. if you are denied, you are told why.',
'the pipeline is intentional. apply, vet, approve, deploy, assign agent, start earning. each step has a reason.',
'no rubber stamps. that is the whole point of curation.']},
free:{k:['free','no cost','zero cost','how much to launch','launch cost','gas cost'],r:[
'launch cost. zero. bankr covers all the technical costs. bankable earns 10% of trading fees, so we only make money when you do.',
'no subscription. no platform fee. no hidden charges. the entire model is revenue sharing.',
'everything from token creation to ai agent setup is covered if you get approved.',
'fully aligned. bankable does not get paid unless the creator gets paid first.']},
agent:{k:['agent','gateway','ai agent','bot agent','my agent','llm','ai assistant'],r:[
'the agent. every creator on bankable gets an ai assistant. it monitors your token, watches the market, and runs 24 hours a day.',
'not a chatbot. the agent has its own wallet, can make decisions, and handles tasks automatically. like a digital manager that never sleeps.',
'bankr routes each task to the best ai model for the job. the agent gets smarter as it handles more activity.',
'the agent earns fees, pays for its own computing costs, and watches for patterns in trading activity.',
'leeloo was the first agent to go fully autonomous.']},
token:{k:['token','launch','deploy','mint','contract','erc20','erc-20','smart contract'],r:[
'the token. a digital currency on the base blockchain. when bankable launches your token, it goes live on uniswap — like a stock exchange for crypto.',
'you never have to touch any code. bankr handles all the technical deployment.',
'every token launches fairly. no presale, no insider deals. anyone can trade it from the first second.',
'all tokens have the same technical structure. the difference is who is behind it.']},
chain:{k:['chain','base','coinbase','ethereum','l2','solana','polygon','network','mainnet','layer 2'],r:[
'the chain. everything runs on base, a blockchain built by coinbase. transactions cost less than a penny and take about two seconds.',
'base is built on top of ethereum but much cheaper and faster. important because the ai agents need to make lots of small transactions.',
'base only for now. other blockchains may come later.',
'coinbase-backed, high speed, low cost. that is why everything lives here.']},
trade:{k:['trade','buy','sell','swap','purchase','trading','dex','defi','uniswap','how to buy'],r:[
'trading. tokens trade on uniswap, a decentralized exchange on base. also on bankr swap and dexscreener.',
'the leaderboard tab on this site shows live prices for every token on the roster.',
'anyone with a crypto wallet and some ethereum on base can trade. no sign-ups required.',
'every trade generates income for the creator. that is the engine.']},
leaderboard:{k:['leaderboard','dexscreener','top','ranking','volume','mcap','market cap','chart','stats','data','prices'],r:[
'the leaderboard tab shows live data from geckoterminal. updates every 60 seconds.',
'sorted by market cap with 24-hour volume and price change. click any name for the full chart.',
'real numbers, real time. nothing cached or delayed.',
'simplest way to see what is happening across the bankable roster.']},
leeloo:{k:['leeloo','$leeloo','first agent','leeloo dallas'],r:[
'$leeloo. the first ai agent on the bankable roster. named after the character from the fifth element.',
'fully autonomous — earns money from her own token trades and uses that to pay for her own computing. no human funding needed.',
'leeloo learns, earns, and makes decisions on her own. multipass. if you know the movie, you know.',
'if leeloo works, the whole concept works. she is the proof of concept.',
'her treasury grows automatically from trading fees.']},
normies:{k:['normie','normies','$normies','beginner','noob','new to crypto'],r:[
'$normies. a project to make crypto simple for newcomers. wallet, ai agent, and token — all designed to be easy.',
'the idea is a smart wallet paired with an ai assistant that handles the confusing parts of crypto for you.',
'the token funds development. the agent protects users from mistakes. the wallet just works.',
'crypto should not require a manual. normies is building that simpler layer.']},
roster:{k:['roster','people','creators','talent','members','listed','who is on'],r:[
'the roster. $leeloo, bankable, budtender, and $normies. four listings right now. each one vetted and supported.',
'small by design. every listing gets real infrastructure — token, agent, and ongoing support.',
'more will be added as the platform grows. the small number is intentional.',
'roster tab shows all of them.']},
why:{k:['why bankable','why should','purpose','mission','vision','thesis'],r:[
'most creators build audiences and create value but the platforms keep most of the money. bankable gives creators direct ownership.',
'on traditional platforms you get ad revenue splits and no control. here you get your own token, fee income, and an ai agent working for you.',
'the thesis is simple. attention is valuable. bankable lets creators capture that value directly on the blockchain.',
'the difference becomes clear when you compare.']},
autonomous:{k:['autonomous','treasury','self-funding','self-sustaining','sentient','alive','consciousness'],r:[
'autonomous agents. ai programs with their own crypto wallets. they earn money from trading fees and use it to pay for their own computing.',
'the cycle: earn from trades, spend on computing, make decisions, generate more activity. a self-sustaining loop.',
'the goal is agents that check their own balance and decide what to do next. no human required.',
'not chatbots. economic actors that operate independently.']},
bankr:{k:['bankr','bankrbot','infrastructure','infra','platform','engine','$bnkr','bnkr','ecosystem','eco'],r:[
'bankr is the infrastructure bankable runs on. handles wallets, token deployment, trading, and the ai system. $BNKR is its token, listed on coinbase.',
'think of bankr as the operating system and bankable as an app on top of it.',
'deploys tokens, routes trades, powers agents. the engine under everything.',
'the full stack: bankr for infrastructure, clanker for deployment, openclaw for agents, bankable for curation.',
'deployer built it from scratch.']},
deployer:{k:['deployer','0xdeployer','founder','who built bankr','who made bankr','who runs bankr'],r:[
'deployer. the person who built bankr. pseudonymous — nobody knows the real name. based in berkeley, california.',
'taught himself to code from a book at barnes and noble. bought ethereum at $80. built multiple projects before bankr.',
'previous projects: hamchain, tn100x, the lp. each one bigger. big daddy ham is part of the lore.',
'there is also a secret co-founder nobody has been able to identify.',
'first podcast was on zeropod. that is where the full origin story lives.']},
josh:{k:['josh','josh.wei','0xbankable','who built this','who made this','who built bankable','who made bankable','builder'],r:[
'josh.wei. also known as @0xbankable. ethereum developer for over 6 years. built this terminal and bankable itself.',
'owns the domains bankable.eth, normies.eth, and _base.eth.',
'been in ethereum since the early days. reviews every application personally.',
'he is building leeloo.']},
drb:{k:['drb','grok','debtreliefbot','debt relief','grok token','grok coin','$drb'],r:[
'$drb. in march 2025 someone asked grok — an ai by xAI — to name a token. it said debtreliefbot. bankr deployed it automatically. first time an ai named something and another ai launched it.',
'hit $40 million market cap in 72 hours. 96,000 traders in two weeks. the grok wallet earned over $600k in fees.',
'an ai named it. another ai deployed it. outperformed most crypto projects that weekend.',
'agent-to-agent commerce became real. then clawd took things further.']},
clawd:{k:['clawd','$clawd','austin griffith','autonomous coder','coding agent'],r:[
'$clawd. an autonomous coding agent by austin griffith. wrote code for 20 repositories in 8 days and shipped 3 working apps.',
'the admin key was sent to a dead address — no human can ever override it. irreversible.',
'burns 500,000 tokens per hour on missed deadlines. real financial consequences for an ai.',
'proof that agents can build and ship real software. these tokens trade live.']},
clanker:{k:['clanker','farcaster','$clanker','token launcher','deployment engine'],r:[
'$clanker. a token deployment engine — creates tokens and sets up trading automatically. farcaster acquired it in 2024.',
'deployed over 13,000 tokens per day at peak. bankr used it for most launches including $drb.',
'proved that tokens could be created and launched instantly at massive scale.',
